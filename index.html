<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=OCS/page/index.html">
  <title>Open-code-Studio 文档中心</title>
  <style>
    :root {
      --primary: #3A8E5E;
      --surface: #121212;
      --on-surface: #E4E2DF;
      --surface-container: #252322;
      --surface-container-hover: #302D2B;
      --on-surface-variant: #C8C5C2;
      --outline-variant: #494846;
      --on-primary: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .hub { text-align: center; max-width: 600px; width: 100%; }
    .hub-header { margin-bottom: 36px; }
    .hub-header img { width: 64px; height: 64px; border-radius: 14px; margin-bottom: 16px; }
    .hub-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .hub-header p { font-size: 0.85rem; color: var(--on-surface-variant); }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 24px 12px;
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: 14px;
      text-decoration: none;
      color: var(--on-surface);
      transition: all 0.2s ease;
    }
    .card:hover {
      background: var(--surface-container-hover);
      border-color: var(--primary);
      transform: translateY(-2px);
      text-decoration: none;
    }
    .card-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700;
    }
    .card-icon.ocs { background: var(--primary); color: var(--on-primary); }
    .card-icon.jmcl { background: #2E6B48; color: #81DAAB; }
    .card-icon.md3 { background: #1E3A2F; color: #81DAAB; }
    .card-title { font-size: 0.95rem; font-weight: 600; }
    .card-desc { font-size: 0.72rem; color: var(--on-surface-variant); line-height: 1.3; }
    footer { margin-top: 36px; font-size: 0.75rem; color: var(--on-surface-variant); }
    footer a { color: var(--primary); text-decoration: none; }
    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="hub">
    <div class="hub-header">
      <img src="OCS/page/logo.jpg" alt="OCS">
      <h1>Open-code-Studio</h1>
      <p>文档中心 · 3 秒后自动前往主站</p>
    </div>

    <div class="cards">
      <a href="OCS/page/index.html" class="card">
        <div class="card-icon ocs">OCS</div>
        <span class="card-title">OCS 主页</span>
        <span class="card-desc">组织介绍与开源项目</span>
      </a>

      <a href="JMCL/page/index.html" class="card">
        <div class="card-icon jmcl">JM</div>
        <span class="card-title">JMCL 文档</span>
        <span class="card-desc">Minecraft 启动器</span>
      </a>

      <a href="Openwebdocs.kit-MD3/page/index.html" class="card">
        <div class="card-icon md3">MD3</div>
        <span class="card-title">Openwebdocs.kit-MD3</span>
        <span class="card-desc">文档站点框架</span>
      </a>
    </div>

    <footer>
      <a href="https://github.com/Open-code-Studio" target="_blank" rel="noopener">GitHub ↗</a>
    </footer>
  </div>
</body>
</html>
