<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=OCS/page/index.html">
  <title>Open-code-Studio 文档中心</title>
  <style>
    :root {
      --primary: #1A6B8A;
      --on-primary: #FFFFFF;
      --surface: #121212;
      --on-surface: #E4E2DF;
      --surface-container: #252322;
      --surface-container-high: #302D2B;
      --on-surface-variant: #C8C5C2;
      --outline-variant: #494846;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: var(--surface);
      color: var(--on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 640px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Noto Serif SC', "Songti SC", "STSong", serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--on-surface-variant);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 20px;
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: 16px;
      text-decoration: none;
      color: var(--on-surface);
      transition: all 0.25s ease;
    }

    .card:hover {
      background: var(--surface-container-high);
      border-color: var(--primary);
      transform: translateY(-2px);
      text-decoration: none;
    }

    .card-icon { display: none; }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      line-height: 1.4;
    }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: var(--on-surface-variant);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.loli.net">
  <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="OCS/page/logo.jpg" alt="OCS Logo" width="80" height="80" style="border-radius: 16px;">
    </div>

    <h1>Open-code-Studio</h1>
    <p class="subtitle">正在前往 OCS 主页...</p>

    <div class="cards">
      <a href="OCS/page/index.html" class="card" style="grid-column: 1 / -1;">
        <span class="card-title">如果没有自动跳转，请点击这里</span>
        <span class="card-desc">前往 Open-code-Studio 主站</span>
      </a>
    </div>

    <footer>
      <a href="https://github.com/Open-code-Studio" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
    </footer>
  </div>
</body>
</html>
